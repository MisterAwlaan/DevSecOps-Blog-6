name: Lab 4 - DAST & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dast-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devsecops-blog:latest .

      - name: Start application container
        run: |
          docker run -d \
            --name blog-app \
            -p 5000:5000 \
            devsecops-blog:latest

      - name: Wait for application to be ready
        run: |
          echo "Waiting for app to start..."
          for i in {1..15}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "App is up!"
              break
            fi
            echo "Attempt $i/15 - not ready yet..."
            sleep 3
          done

      - name: Run Nikto DAST scan
        run: |
          docker run --rm \
            --network host \
            frapsoft/nikto \
            -h http://localhost:5000 \
            -o /tmp/nikto-report.txt \
            -Format txt \
            -timeout 30 \
            -nointeractive || true

      - name: Show Nikto report
        run: |
          docker run --rm \
            --network host \
            -v /tmp:/tmp \
            frapsoft/nikto \
            -h http://localhost:5000 \
            -Format txt \
            -timeout 30 \
            -nointeractive 2>&1 | tee nikto-report.txt || true

      - name: Upload Nikto report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nikto-dast-report
          path: nikto-report.txt

      - name: Stop application container
        if: always()
        run: docker stop blog-app && docker rm blog-app

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push to DockerHub
        run: |
          docker tag devsecops-blog:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-blog:latest
          docker tag devsecops-blog:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-blog:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-blog:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-blog:${{ github.sha }}

      - name: Pipeline summary
        if: always()
        run: |
          echo "========================================="
          echo "  Lab 4 - DAST & Deploy Summary"
          echo "========================================="
          echo "Docker image built"
          echo "Nikto DAST scan completed"
          echo "Image pushed to DockerHub"
          echo "  Image: ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-blog:latest"
          echo "========================================="
