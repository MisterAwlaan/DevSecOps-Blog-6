name: DAST & Blue-Green Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dast-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devsecops-blog:latest .

      # --- PHASE BLUE/GREEN : LANCEMENT VIA COMPOSE ---
      - name: Start Green environment (via Docker Compose)
        run: docker compose up -d

      - name: Wait for application to be ready
        run: |
          echo "Waiting for app to start on Nginx (port 8080)..."
          for i in {1..10}; do
            # On interroge le port 8080 défini dans ton nginx.conf / docker-compose
            if curl -s http://localhost:8080 > /dev/null; then
              echo "Green app is up!"
              exit 0
            fi
            echo "Attempt $i/10 - not ready yet..."
            sleep 5
          done
          # Si ça échoue, on affiche les logs pour comprendre pourquoi
          docker compose logs
          exit 1

      # --- PHASE DE TEST (DAST) ---
      - name: Run Wapiti DAST scan
        id: wapiti_scan
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y wapiti
          wapiti -u http://localhost:8080 -f html -o wapiti-report.html

      # --- LOGIQUE DE ROLLBACK ---
      - name: Check Scan Result & Rollback
        run: |
          if [ "${{ steps.wapiti_scan.outcome }}" == "failure" ]; then
            echo "🚨 DANGER : Vulnérabilités détectées. ROLLBACK immédiat."
            docker compose down
            exit 1
          fi

      # --- NETTOYAGE & PUBLICATION ---
      - name: Stop Green environment before push
        run: docker compose down

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push
        if: github.event_name == 'push'
        run: |
          REPO=${{ secrets.DOCKERHUB_USERNAME }}/devsecops-blog
          docker tag devsecops-blog:latest $REPO:latest
          docker tag devsecops-blog:latest $REPO:${{ github.sha }}
          docker push $REPO:latest
          docker push $REPO:${{ github.sha }}