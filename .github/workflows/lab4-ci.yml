name: Lab 4 - DAST & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dast-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devsecops-blog:latest .

      - name: Start application container
        run: |
          docker run -d \
            --name blog-app \
            -p 5000:5000 \
            -e FLASK_RUN_HOST=0.0.0.0 \
            devsecops-blog:latest

      - name: Wait for application to be ready
        run: |
          echo "Waiting for app to start..."
          for i in {1..10}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "App is up!"
              exit 0
            fi
            echo "Attempt $i/10 - not ready yet..."
            sleep 3
          done
          exit 1

      - name: Run Nikto DAST scan
        # Nikto scanne l'application qui tourne sur le port 5000 de l'hôte
        run: |
          docker run --rm --network host frapsoft/nikto -h http://localhost:5000 -Tuning 123bde -o nikto-report.txt
        continue-on-error: true

      - name: Upload Nikto report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nikto-dast-report
          path: nikto-report.txt

      - name: Stop application container
        if: always()
        run: |
          docker stop blog-app || true
          docker rm blog-app || true

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push to DockerHub
        if: github.event_name == 'push'
        run: |
          REPO=${{ secrets.DOCKERHUB_USERNAME }}/devsecops-blog
          docker tag devsecops-blog:latest $REPO:latest
          docker tag devsecops-blog:latest $REPO:${{ github.sha }}
          docker push $REPO:latest
          docker push $REPO:${{ github.sha }}