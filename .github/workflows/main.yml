name: CI Quality & Security

on:
  push:
    branches: [main]
    paths:
      - '**.py'  # OBJECTIF : Ne lance QUE si des fichiers Python changent
  pull_request:
    branches: [main]
    paths:
      - '**.py'

jobs:
  # JOB 1 & 2 : Parallélisation intelligente
  # Flake8 et Gitleaks tournent en même temps que les tests
  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install flake8
      - run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  gitleaks:
    name: Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # JOB 3 : Séparer les jobs (test)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Tests
        run: python -m pytest

  # JOB 4 : Séparer les jobs (build)
  build:
    runs-on: ubuntu-latest
    # OBJECTIF : Ne builder QUE si les tests (et le linting) sont OK
    needs: [test, flake8] 
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t mon-app-python .