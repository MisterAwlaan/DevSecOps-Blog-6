name: CI Quality & Security

on:
  push:
    branches: [main]
    paths:
      - '**.py'
  pull_request:
    branches: [main]
    paths:
      - '**.py'

jobs:
  # Job 1 : Analyse de code (Linting)
  # Ce job tourne en parallèle des autres
  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # Job 2 : Scan de secrets (Sécurité)
  # Ce job tourne aussi en parallèle
  gitleaks:
    name: Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3 : Tests Unitaires
  # Tourne en parallèle de flake8 et gitleaks
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Tests
        run: python -m pytest

  # Job 4 : Docker Build
  # NE se lance QUE si les tests sont OK (grâce au 'needs')
  build:
    runs-on: ubuntu-latest
    needs: [test, flake8] # On attend que les tests ET le linting soient OK
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t mon-app-python .