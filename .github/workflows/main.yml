name: CI Quality & Security

on:
  push:
    branches: [main]
    paths:
      - '**.py'
  pull_request:
    branches: [main]
    paths:
      - '**.py'

jobs:
  # JOB 1 : Tests unitaires
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Tests
        run: python -m pytest

  # JOB 2 : Build Docker (ne se lance que si 'test' réussit)
  build:
    runs-on: ubuntu-latest
    needs: test  # <-- C'est ici qu'on gère la dépendance
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -t mon-app-python .