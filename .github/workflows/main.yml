name: CI Quality & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**.py' # S'active si un fichier Python est modifié

jobs:
  # Job 1 : Linting avec Flake8
  flake8_py3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 3.7 est très ancien, préférez une version plus récente

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # Job 2 : Scan de secrets
  gitleaks:
    name: Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour Gitleaks afin de scanner l'historique

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Tests
        run: python -m pytest

  # 3. Séparer les jobs : Second job pour le Build Docker
  build:
    runs-on: ubuntu-latest
    # 4. Paralléliser intelligemment : ce job attend que 'test' soit fini et réussi
    needs: test
    
    steps:
      - uses: actions/checkout@v4