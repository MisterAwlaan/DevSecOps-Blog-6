services:
  router:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - blog-blue
      - blog-green

  blog-blue:
    build: .
    image: devsecops-blog:blue
    ports:
      - "5000" 
    environment:
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_APP=app.py
    deploy:
      replicas: 2

  blog-green:
    build: .
    image: devsecops-blog:green
    ports:
      - "5000" 
    environment:
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_APP=app.py
    deploy:
      replicas: 2