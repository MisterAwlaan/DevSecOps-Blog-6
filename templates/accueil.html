<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="style_accueil.css"> -->
    <title>Miamstagram - Accueil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand">
                    <img src="{{ url_for('static', filename='img/logo_horizontal.png') }}" alt="Logo" height="80">
                </a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <form class="d-flex ms-auto" role="search">
                <input class="form-control me-2" type="search" placeholder="Rechercher..." aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">🔍</button>
                </form>
                <div class="d-flex ms-auto">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Connexion</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link" href="#">Inscription</a>
                        </li>
                    </ul>
                </div>
            </div>
            </div>
        </nav>   
    </header> 
    <div class="row text-center mt-3" style="background-color: #ff85a1;">
    <div class="col-12">
        <img src="{{ url_for('static', filename='img/logo.png') }}" 
             alt="Logo" 
             class="img-fluid"
             style="max-width: 250px;">
        <p class="mt-2" style="color: #ffffff; font-weight: bold;">Partagez vos recettes avec le monde entier</p>
    </div>
</div>
    <div class ="row mt-5 justify-content-center">
        <div class="col-8">
            <div class="row ">
                <div class="col-md-6">
                    <h2>Recettes populaires</h2>
                    <hr class="my_line">
                </div>
            </div>
            <div class ="row justify-content-center mt-5">
                {% for recette in recettes %}
                <div class="col-md-6 mb-4">
                    <div class="card">
                    <img src="{{ url_for('static', filename='img/' + recette.image_file) }}" class="card-img-top" style="border-radius: 25px;" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">{{ recette.titre }}</h5>
                        <p class="card-text">{{ recette.description }}</p>
                        <a href="{{ url_for('recettes_page', recette_id=recette.recette_id) }}" class="btn btn-primary">A vos fourneaux !</a>
                    </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    <div class="row d-flex mt-8 text-center">
        <footer class="mt-8">
            <p>&copy; 2026 - Plateforme Cuisine développée avec Flask</p>
        </footer> 
    </div>
</body>
</html>
