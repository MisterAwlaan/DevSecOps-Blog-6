<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miamstagram - Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card text-center p-4">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo"
                        class="img-fluid mx-auto mb-3" style="max-width: 150px;">
                    <h2 class="mb-4">Bon retour !</h2>

                    {% with messages = get_flashed_messages() %}
                    {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-info" style="border-radius: 50px;">{{ message }}</div>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('connexion') }}">
                        <div class="mb-3 text-start">
                            <label for="username" class="form-label" style="color: #ff4d6d; font-weight: bold;">Nom
                                d'utilisateur</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-4 text-start">
                            <label for="password" class="form-label" style="color: #ff4d6d; font-weight: bold;">Mot de
                                passe</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                    </form>
                    <p class="mt-4"><a href="{{ url_for('inscription') }}"
                            style="color: #7a4a53; text-decoration: none;">Pas encore inscrit ? Crée ton compte 🌸</a>
                    </p>
                    <p><a href="{{ url_for('home') }}" class="btn btn-outline-success mt-2">Retour à l'accueil</a></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
